<section class="stats" aria-label="Hospital statistics">
  <div class="container">
    <div class="stats-grid">
      <div class="stat-card reveal-hidden">
        <div class="stat-icon"><i class="fa-solid fa-user-doctor" aria-hidden="true"></i></div>
        <div class="stat-number counter" data-target="12" aria-label="12 Specialist Doctors">0</div>
        <div class="stat-label">Specialist Doctors</div>
      </div>
      <div class="stat-card reveal-hidden">
        <div class="stat-icon"><i class="fa-solid fa-hospital-user" aria-hidden="true"></i></div>
        <div class="stat-number counter" data-target="1200" aria-label="1200 Happy Patients">0</div>
        <div class="stat-label">Happy Patients</div>
      </div>
      <div class="stat-card reveal-hidden">
        <div class="stat-icon"><i class="fa-solid fa-award" aria-hidden="true"></i></div>
        <div class="stat-number counter" data-target="1" aria-label="1 Years of Excellence">0</div>
        <div class="stat-label">Years of Excellence</div>
      </div>
      <div class="stat-card reveal-hidden">
        <div class="stat-icon"><i class="fa-solid fa-star" aria-hidden="true"></i></div>
        <div class="stat-number counter" data-target="98" aria-label="98% Patient Satisfaction">0</div>
        <div class="stat-label">% Patient Satisfaction</div>
      </div>
    </div>
  </div>
</section>
